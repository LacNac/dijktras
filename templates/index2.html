<!DOCTYPE html>
<html>
<head>
    <title>Dijkstra Visualizer</title>
    <style>
        canvas { border: 1px solid black; }
        body { font-family: Arial; }
    </style>
</head>
<body>

<h1>Dijkstra Visualizer</h1>

<p>Số đỉnh:</p>
<input id="n" type="number" value="5">

<p>Đỉnh bắt đầu:</p>
<input id="start" type="number" value="1">

<p>Đỉnh đích:</p>
<input id="target" type="number" value="5">

<p>Cạnh (u v w mỗi dòng):</p>
<textarea id="edges" rows="6" cols="40" >
1 2 2
1 3 4
2 4 7
3 5 1
</textarea>

<br><br>
<button onclick="run()">Run</button>

<h3>Canvas</h3>
<canvas id="cv" width="500" height="400"></canvas>

<script>
const canvas = document.getElementById("cv");
const ctx = canvas.getContext("2d");

let positions = {};
let steps = [];
let stepIndex = 0;
let finalPath = [];
let currentEdges = [];

function randomPos(n) {
    positions = {};
    for (let i = 1; i <= n; i++) {
        positions[i] = {
            x: 50 + Math.random() * 400,
            y: 50 + Math.random() * 300
        };
    }
}

function drawGraph(edges, highlightNode=null, highlightEdge=null) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "gray";
    for (const [u,v,w] of edges) {
        const a = positions[u];
        const b = positions[v];

        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
    }

    if (highlightEdge) {
        const a = positions[highlightEdge.from];
        const b = positions[highlightEdge.to];
        ctx.strokeStyle = "red";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
        ctx.lineWidth = 1;
    }

    for (const i in positions) {
        const p = positions[i];
        ctx.beginPath();
        ctx.arc(p.x, p.y, 15, 0, Math.PI*2);

        ctx.fillStyle = (i == highlightNode) ? "orange" : "lightblue";
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "black";
        ctx.fillText(i, p.x-4, p.y+4);
    }
}

function drawPath(path) {
    if (!path || path.length === 0) return;

    ctx.strokeStyle = "green";
    ctx.lineWidth = 4;

    for (let i = 0; i < path.length - 1; i++) {
        const a = positions[path[i]];
        const b = positions[path[i+1]];

        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
    }

    ctx.lineWidth = 1;
}

async function run() {
    const n = parseInt(document.getElementById("n").value);
    const start = parseInt(document.getElementById("start").value);
    const target = parseInt(document.getElementById("target").value);

    const raw = document.getElementById("edges").value.trim().split("\n");
    currentEdges = raw.map(x => x.trim().split(/\s+/).map(Number));

    randomPos(n);
    drawGraph(currentEdges);

    const res = await fetch("/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ n, start, target, edges: currentEdges })
    });

    const data = await res.json();
    steps = data.steps;
    finalPath = data.path;
    stepIndex = 0;

    animate();
}

function animate() {
    if (stepIndex >= steps.length) {
        drawGraph(currentEdges);
        drawPath(finalPath);
        return;
    }

    const s = steps[stepIndex];

    if (s.type === "visit") {
        drawGraph(currentEdges, s.node, null);
    } else if (s.type === "relax") {
        drawGraph(currentEdges, null, s);
    }

    stepIndex++;
    setTimeout(animate, 700);
}
</script>

</body>
</html>
